<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>RETRO WORKOUT PRO</title>
  <link rel="manifest" href="manifest.json">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/galmuri@latest/dist/galmuri.css" rel="stylesheet">
  <style>
    body { font-family: 'Galmuri11', sans-serif; background-color: #f4f4f5; }
    .pixel-shadow { box-shadow: 4px 4px 0px 0px #000; }
    .hidden { display: none !important; }
  </style>
</head>
<body class="m-0 p-0 text-black select-none overflow-hidden">
  <div class="flex flex-col h-[100dvh] max-w-md mx-auto bg-white border-x-4 border-black">
    <header class="px-6 pt-8 pb-4 border-b-4 border-black bg-white">
      <h1 class="text-2xl font-black">WORKOUT<span class="text-zinc-500">_PRO</span></h1>
      <p id="timerDisplay" class="text-lg font-bold mt-2 text-zinc-600">REST: --:--</p>
    </header>

    <main class="flex-1 overflow-y-auto no-scrollbar p-5">
      <div id="view-record" class="flex flex-col gap-4">
        <button id="btn-record-set" class="w-full h-32 bg-black text-white font-black text-xl pixel-shadow active:translate-y-2 active:shadow-none">PUSH (RECORD)</button>
        <div id="timeline-container" class="border-2 border-black p-4"></div>
      </div>

      <div id="view-diet" class="hidden flex-col gap-4">
        <select id="foodSelect" class="w-full border-4 border-black p-3 font-bold">
          <option value="23">닭가슴살 (23g)</option>
          <option value="6">계란 (6g)</option>
        </select>
        <button onclick="addDiet()" class="bg-white border-4 border-black py-3 font-black">ADD DIET</button>
        <div id="diet-list" class="border-2 border-black p-4 text-xs font-bold"></div>
      </div>

      <div id="view-calendar" class="hidden">
        <div id="calendar-grid" class="grid grid-cols-7 gap-2"></div>
      </div>
    </main>

    <nav class="flex border-t-4 border-black">
      <button onclick="switchTab('record')" class="flex-1 py-4 font-black border-r-4 border-black">REC</button>
      <button onclick="switchTab('diet')" class="flex-1 py-4 font-black border-r-4 border-black">DIET</button>
      <button onclick="switchTab('calendar')" class="flex-1 py-4 font-black">CAL</button>
    </nav>
  </div>

  <script>
    let records = JSON.parse(localStorage.getItem('data')) || {};
    let timer, timeLeft = 0;

    function startTimer() {
        clearInterval(timer);
        timeLeft = 60;
        timer = setInterval(() => {
            timeLeft--;
            document.getElementById('timerDisplay').innerText = `REST: ${timeLeft}s`;
            if(timeLeft <= 0) { clearInterval(timer); document.getElementById('timerDisplay').innerText = "REST: --:--"; }
        }, 1000);
    }

    function addRecord(type, data) {
        const today = new Date().toISOString().split('T')[0];
        if(!records[today]) records[today] = [];
        records[today].push({ type, data, time: new Date().toLocaleTimeString() });
        localStorage.setItem('data', JSON.stringify(records));
    }

    document.getElementById('btn-record-set').onclick = () => {
        addRecord('workout', 'Set Recorded');
        startTimer();
        alert('운동 기록 완료! 1분 휴식 시작');
    };

    function addDiet() {
        const food = document.getElementById('foodSelect');
        addRecord('diet', food.options[food.selectedIndex].text);
        alert('식단 기록 완료!');
    }

    function switchTab(tab) {
        ['view-record', 'view-diet', 'view-calendar'].forEach(id => document.getElementById(id).classList.add('hidden'));
        document.getElementById('view-' + tab).classList.remove('hidden');
    }
  </script>
</body>
</html>
